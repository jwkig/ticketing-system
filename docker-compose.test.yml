# Test (staging-like) override. Isolated ports so it can run alongside dev/prod
# when launched with its own project name (-p ticketing-test).
#   ./deploy/compose.ps1 test up
services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Test
    restart: unless-stopped

  web:
    ports:
      - "8081:80"
    restart: unless-stopped

  db:
    ports:
      - "5433:5432"
    restart: unless-stopped
