<div class="teams-page">
  <header class="page-head">
    <h1>Teams</h1>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      New team
    </button>
  </header>

  <app-error-banner [message]="errorMessage()" />

  @if (loading()) {
    <app-loading-spinner label="Loading teams…" />
  } @else {
    <table mat-table [dataSource]="teams()" class="teams-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">{{ t.name }}</td>
      </ng-container>

      <ng-container matColumnDef="tickets">
        <th mat-header-cell *matHeaderCellDef>Tickets</th>
        <td mat-cell *matCellDef="let t">{{ t.ticketCount }}</td>
      </ng-container>

      <ng-container matColumnDef="epics">
        <th mat-header-cell *matHeaderCellDef>Epics</th>
        <td mat-cell *matCellDef="let t">{{ t.epicCount }}</td>
      </ng-container>

      <ng-container matColumnDef="modified">
        <th mat-header-cell *matHeaderCellDef>Modified</th>
        <td mat-cell *matCellDef="let t">{{ t.modifiedAt | date: 'medium' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let t">
          <button mat-button (click)="startEdit(t)">Edit</button>
          <button
            mat-button
            color="warn"
            [disabled]="!canDelete(t)"
            [title]="canDelete(t) ? 'Delete team' : 'Team has tickets or epics'"
            (click)="confirmDelete(t)"
          >
            Delete
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="columns"></tr>
      <tr mat-row *matRowDef="let row; columns: columns"></tr>
    </table>

    @if (teams().length === 0) {
      <p class="empty">No teams yet. Create your first team.</p>
    }
  }
</div>
